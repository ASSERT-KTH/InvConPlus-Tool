name: InvCon+ Reproducibility CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # L1: Lint the Dockerfile
  L1-lint:
    name: L1 Dockerfile Lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run hadolint
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008 DL3013 DL3003 DL3059

  # L2: Build the Docker image
  L2-build:
    name: L2 Docker Build
    runs-on: ubuntu-22.04
    needs: L1-lint
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build Docker image
        run: docker build -t invconplus-tool:ci .

  # L3: Smoke test - requires QUICKNODE_URL and ETHERSCAN_API_KEY secrets
  # This job is skipped until API keys are available as GitHub secrets
  L3-smoke:
    name: L3 Smoke Test
    runs-on: ubuntu-22.04
    needs: L2-build
    # Only run when secrets are available - set SMOKE_TEST_ENABLED to 'true' in repo vars
    if: ${{ vars.SMOKE_TEST_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build Docker image
        run: docker build -t invconplus-tool:ci .

      - name: Run smoke test on single ERC20 contract
        env:
          QUICKNODE_URL: ${{ secrets.QUICKNODE_URL }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          docker run --rm \
            -e QUICKNODE_URL="${QUICKNODE_URL}" \
            -e ETHERSCAN_API_KEY="${ETHERSCAN_API_KEY}" \
            -v ${{ github.workspace }}/output:/app/Token-data/result \
            invconplus-tool:ci \
            python3 -m invconplus.main \
              --address 0x000ae26329aa0c57b9badbdee2996624272905e9 \
              --maxCount 50 \
              --minSupport 10

      - name: Verify invariant output produced
        run: |
          ls output/ || true
          count=$(find output/ -name "*.inv" -o -name "*.json" 2>/dev/null | wc -l)
          echo "Found $count output file(s)"
          if [ "$count" -lt 1 ]; then
            echo "ERROR: no output files produced"
            exit 1
          fi
          echo "OK: smoke test output verified"

  # L4: Dockerfile lint (hadolint) - already done in L1, this confirms no regressions
  L4-verify:
    name: L4 Import Verification
    runs-on: ubuntu-22.04
    needs: L2-build
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build Docker image
        run: docker build -t invconplus-tool:ci .

      - name: Verify Python module imports correctly
        run: |
          docker run --rm invconplus-tool:ci \
            python3 -c "
          import invconplus
          import invconplus.engine
          import invconplus.daikon
          from invconplus.const import RESULT_DIR, ENABLE_CACHE
          print('All imports OK')
          print('RESULT_DIR:', RESULT_DIR)
          print('ENABLE_CACHE:', ENABLE_CACHE)
          "
